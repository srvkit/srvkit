packages:
    - ./packages/*
    - ./tests/*

autoInstallPeers: false
strictPeerDependencies: false

allowBuilds:
    esbuild: true

catalogs:
    dev:
        "@rsbuild/core": 2.0.0
        vite: 8.0.12
    peer:
        "@rsbuild/core": ^2.0.0
        vite: ^8.0.12

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
    - "@apst/*"
