packages:
    - ./packages/*
    - ./tests/*
    - ./bench
    - ./examples/vite/*
    - ./examples/rsbuild/*

autoInstallPeers: false
strictPeerDependencies: false

allowBuilds:
    esbuild: true
    sharp: false
    workerd: true

catalogs:
    dep:
        es-toolkit: ^1.40.0
    dev:
        "@rsbuild/core": 2.0.0
        vite: 8.0.12
    peer:
        "@rsbuild/core": ^2.0.0
        vite: ^8.0.12
    test:
        vitest: ^4.1.10
    example:
        "@types/express": ^5.0.6
        express: ^5.2.1
        hono: ^4.12.30

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
    - "@apst/*"
    - "envkist"
